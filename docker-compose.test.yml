services:
  db-test:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ragtest
      POSTGRES_PASSWORD: ragtest
      POSTGRES_DB: rag_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragtest -d rag_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data  # no persistence between test runs

  api-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    environment:
      API_KEY: test-api-key-do-not-use-in-production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DATABASE_URL: postgresql+asyncpg://ragtest:ragtest@db-test:5432/rag_test
      LOG_LEVEL: WARNING
    ports:
      - "8001:8000"
    depends_on:
      db-test:
        condition: service_healthy
    volumes:
      - hf_cache_test:/app/.cache/huggingface

volumes:
  hf_cache_test:
